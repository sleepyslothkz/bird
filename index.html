<html lang="kk">
<head>

<title>PAUL BIRD - FAST MODE</title>
<style>
body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background-color:#70c5ce; font-family:Arial,sans-serif; }
canvas { display:block; touch-action:none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resize(){
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
}

// AUDIO SYSTEM (Web Audio API)
let audioCtx = null;
function unlockAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
}
document.addEventListener("touchstart",unlockAudio,{once:true});
document.addEventListener("mousedown",unlockAudio,{once:true});

function playSnd(f,type,dur,vol=0.08){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
    try {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = f;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    } catch(e){}
}

let highScore = localStorage.getItem("paul_bird_best") || 0;
let birdY, v, score, pipes, gameState = "START", timerVal = 3;

// ПАРАМЕТРЫ СКОРОСТИ
let pipeSpeed; // Скорость движения труб

function reset(){
    birdY = window.innerHeight/2;
    v = 0; score = 0; pipes = [];
    // Установлена повышенная скорость (было 0.006, стало 0.0075 для ускорения)
    pipeSpeed = window.innerWidth * 0.0075; 
}

function startCount(){
    gameState = "COUNT";
    timerVal = 3;
    playSnd(400,"sine",0.1);
    let interval = setInterval(()=>{
        timerVal--;
        if(timerVal > 0) playSnd(400,"sine",0.1);
        else if(timerVal === 0) playSnd(600,"sine",0.2);
        else { clearInterval(interval); gameState = "PLAY"; }
    }, 1000);
}

function input(e){
    if(e) e.preventDefault();
    if(gameState === "START" || gameState === "OVER") {
        reset(); startCount();
    } else if(gameState === "PLAY"){
        // Прыжок стал чуть сильнее (-0.012), чтобы успевать за скоростью
        v = window.innerHeight * -0.012; 
        playSnd(450,"square",0.08);
    }
}

window.addEventListener("touchstart",input,{passive:false});
window.addEventListener("mousedown",input);
window.addEventListener("resize",resize);

function draw(){
    const w = window.innerWidth;
    const h = window.innerHeight;
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0,0,w,h);

    if(gameState === "PLAY"){
        v += h * 0.00065; // Гравитация чуть выше для динамики
        birdY += v;

        // Трубы появляются чаще (интервал 220 вместо 250)
        if(pipes.length === 0 || pipes[pipes.length-1].x < w-220){
            pipes.push({ x: w, y: Math.random()*(h-350)+100, scored: false });
        }

        pipes.forEach((p,i)=>{
            p.x -= pipeSpeed; // Применяем новую скорость

            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(p.x, 0, 60, p.y);
            ctx.fillRect(p.x, p.y+220, 60, h);

            if(w*0.2+60 > p.x && w*0.2 < p.x+60 && (birdY < p.y || birdY+30 > p.y+220)){
                gameState = "OVER";
                playSnd(150,"sawtooth",0.4);
            }

            if(!p.scored && p.x < w*0.2){
                score++;
                p.scored = true;
                
                // Каждые 20 очков - звук "УАУ"
                if(score > 0 && score % 20 === 0) {
                    playSnd(880, "sine", 0.2, 0.15); 
                    setTimeout(() => playSnd(1100, "sine", 0.3, 0.15), 100);
                } else {
                    playSnd(900,"triangle",0.12);
                }

                if(score > highScore){
                    highScore = score;
                    localStorage.setItem("paul_bird_best", highScore);
                }
            }
            if(p.x < -60) pipes.splice(i,1);
        });

        if(birdY > h || birdY < 0){
            gameState = "OVER";
            playSnd(150,"sawtooth",0.4);
        }
