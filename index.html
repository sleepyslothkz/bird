<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul Bird</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#000;
}

canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let y
let v
let gravity=0.5

let pipes=[]
let score=0

const best=96

let state="start"
let countdown=0

let paulColor="white"

let lastTime=0

// ---------- SOUND ----------

let audioCtx

function beep(freq,time){

if(!audioCtx)
audioCtx=new(window.AudioContext||window.webkitAudioContext)()

const osc=audioCtx.createOscillator()
const gain=audioCtx.createGain()

osc.frequency.value=freq
osc.connect(gain)
gain.connect(audioCtx.destination)

gain.gain.value=0.1

osc.start()

setTimeout(()=>{
osc.stop()
},time)

}

// ---------- GAME ----------

function reset(){

y=canvas.height/2
v=0
pipes=[]
score=0

}

function startCountdown(){

countdown=3
state="count"

const t=setInterval(()=>{

countdown--

beep(400,80)

if(countdown<=0){
clearInterval(t)
state="play"
}

},1000)

}

function tap(){

if(state==="start"||state==="over"){

reset()
startCountdown()

}

else if(state==="play"){

v=-9
beep(700,60)

}

}

document.addEventListener("mousedown",tap)
document.addEventListener("touchstart",tap)

// ---------- BACKGROUND ----------

function background(){

if(score>=200){

ctx.fillStyle="#000"
ctx.fillRect(0,0,canvas.width,canvas.height)

if(Math.random()<0.03){

ctx.strokeStyle="white"
ctx.lineWidth=3

ctx.beginPath()
ctx.moveTo(Math.random()*canvas.width,0)
ctx.lineTo(Math.random()*canvas.width,canvas.height)
ctx.stroke()

}

}

else if(score>=100){

ctx.fillStyle="#001b44"
ctx.fillRect(0,0,canvas.width,canvas.height)

}

else{

let g=ctx.createLinearGradient(0,0,0,canvas.height)
g.addColorStop(0,"#87ceeb")
g.addColorStop(1,"#e0f7ff")

ctx.fillStyle=g
ctx.fillRect(0,0,canvas.width,canvas.height)

}

}

// ---------- LOG ----------

function drawLog(x,y,w,h){

ctx.fillStyle="#8b5a2b"
ctx.fillRect(x,y,w,h)

ctx.strokeStyle="#5c3a1e"

for(let i=0;i<h;i+=25){

ctx.beginPath()
ctx.moveTo(x,y+i)
ctx.lineTo(x+w,y+i)
ctx.stroke()

}

}

// ---------- GAME LOOP ----------

function game(time){

const dt=(time-lastTime)/16
lastTime=time

background()

if(state==="play"){

v+=gravity*dt
y+=v*dt

if(pipes.length===0||pipes[pipes.length-1].x<canvas.width-320){

pipes.push({
x:canvas.width,
y:Math.random()*(canvas.height-300)+100,
scored:false
})

}

pipes.forEach((p,i)=>{

p.x-=2.2*dt

drawLog(p.x,0,70,p.y)
drawLog(p.x,p.y+220,70,canvas.height)

if(120>p.x&&120<p.x+70){

if(y<p.y||y+30>p.y+220){

state="over"
beep(150,200)

}

}

if(!p.scored&&p.x<120){

score++
p.scored=true

beep(900,50)

if(score%50===0){

const colors=["white","yellow","cyan","lime","orange"]
paulColor=colors[Math.floor(Math.random()*colors.length)]

}

}

if(p.x<-70){
pipes.splice(i,1)
}

})

if(y>canvas.height||y<0){
state="over"
}

}

ctx.fillStyle=paulColor
ctx.font="bold 32px Arial"
ctx.fillText("PAUL",120,y+20)

ctx.fillStyle="white"
ctx.font="20px Arial"

ctx.fillText("Очки: "+score,20,40)
ctx.fillText("Рекорд: "+best,20,70)

if(state==="count"){

ctx.font="100px Arial"
ctx.textAlign="center"
ctx.fillText(countdown,canvas.width/2,canvas.height/2)

}

requestAnimationFrame(game)

}

reset()
requestAnimationFrame(game)

</script>

</body>
</html>
