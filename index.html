<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KZ BIRD</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #70c5ce; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let birdY = 200, v = 0, score = 0, pipes = [], gOver = false;

function reset() { birdY = 200; v = 0; score = 0; pipes = []; gOver = false; }
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

window.addEventListener('touchstart', () => { if(gOver) reset(); else v = -8; });
window.addEventListener('keydown', (e) => { if(e.code === 'Space') { if(gOver) reset(); else v = -8; } });

function draw() {
    ctx.fillStyle = "#70c5ce"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (!gOver) {
        v += 0.4; birdY += v;
        if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
            pipes.push({ x: canvas.width, y: Math.random() * (canvas.height - 300) + 100 });
        }
        pipes.forEach((p, i) => {
            p.x -= 3;
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(p.x, 0, 50, p.y);
            ctx.fillRect(p.x, p.y + 200, 50, canvas.height);
            if (p.x < 50 && p.x > 0 && (birdY < p.y || birdY > p.y + 180)) gOver = true;
            if (p.x === 50) score++;
            if (p.x < -50) pipes.splice(i, 1);
        });
        if (birdY > canvas.height || birdY < 0) gOver = true;
    }
    ctx.fillStyle = "yellow"; ctx.fillRect(50, birdY, 30, 20); // Птичка
    ctx.fillStyle = "white"; ctx.font = "30px Arial"; ctx.fillText(score, 20, 50);
    if (gOver) ctx.fillText("GAME OVER - TAP TO RESET", 50, canvas.height/2);
    requestAnimationFrame(draw);
}
resize(); draw(); window.onresize = resize;
</script>
</body>
</html>
