<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul Bird Forest</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let y=canvas.height/2
let v=0
let gravity=0.6

let pipes=[]
let score=0

const best=96

let state="start"
let countdown=0

let paulColor="white"

function reset(){

y=canvas.height/2
v=0
pipes=[]
score=0

}

function startCountdown(){

countdown=3
state="count"

const timer=setInterval(()=>{

countdown--

if(countdown<=0){

clearInterval(timer)
state="play"

}

},1000)

}

function tap(){

if(state==="start"||state==="over"){

reset()
startCountdown()

}

if(state==="play"){

v=-10

}

}

document.addEventListener("mousedown",tap)
document.addEventListener("touchstart",tap)

function drawBackground(){

if(score>=200){

ctx.fillStyle="#000"
ctx.fillRect(0,0,canvas.width,canvas.height)

if(Math.random()<0.05){

ctx.strokeStyle="white"
ctx.lineWidth=3
ctx.beginPath()
ctx.moveTo(Math.random()*canvas.width,0)
ctx.lineTo(Math.random()*canvas.width,canvas.height)
ctx.stroke()

}

}

else if(score>=100){

ctx.fillStyle="#001b44"
ctx.fillRect(0,0,canvas.width,canvas.height)

}

else{

let sky=ctx.createLinearGradient(0,0,0,canvas.height)
sky.addColorStop(0,"#87ceeb")
sky.addColorStop(1,"#e0f7ff")

ctx.fillStyle=sky
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#2ecc71"

for(let i=0;i<10;i++){

ctx.beginPath()
ctx.arc(i*200,canvas.height,300,Math.PI,0)
ctx.fill()

}

}

}

function drawLog(x,y,w,h){

ctx.fillStyle="#8b5a2b"
ctx.fillRect(x,y,w,h)

ctx.strokeStyle="#5c3a1e"

for(let i=0;i<h;i+=20){

ctx.beginPath()
ctx.moveTo(x,y+i)
ctx.lineTo(x+w,y+i)
ctx.stroke()

}

}

function game(){

drawBackground()

if(state==="play"){

v+=gravity
y+=v

if(pipes.length===0||pipes[pipes.length-1].x<canvas.width-300){

pipes.push({
x:canvas.width,
y:Math.random()*(canvas.height-300)+100,
scored:false
})

}

pipes.forEach((p,i)=>{

p.x-=2

drawLog(p.x,0,70,p.y)
drawLog(p.x,p.y+220,70,canvas.height)

if(120>p.x&&120<p.x+70){

if(y<p.y||y+30>p.y+220){

state="over"

}

}

if(!p.scored&&p.x<120){

score++
p.scored=true

if(score%50===0){

const colors=["white","yellow","cyan","lime","orange"]
paulColor=colors[Math.floor(Math.random()*colors.length)]

}

}

if(p.x<-70){
pipes.splice(i,1)
}

})

if(y>canvas.height||y<0){
state="over"
}

}

ctx.fillStyle=paulColor
ctx.font="bold 32px Arial"
ctx.fillText("PAUL",120,y+20)

ctx.fillStyle="white"
ctx.font="20px Arial"

ctx.fillText("Очки: "+score,20,40)
ctx.fillText("Рекорд: "+best,20,70)

if(state==="count"){

ctx.font="100px Arial"
ctx.textAlign="center"
ctx.fillText(countdown,canvas.width/2,canvas.height/2)

}

requestAnimationFrame(game)

}

game()

</script>

</body>
</html>
