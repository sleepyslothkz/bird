<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAUL BIRD</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#70c5ce;
font-family:Arial;
}

canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

function resize(){
canvas.width = window.innerWidth
canvas.height = window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let birdY = canvas.height/2
let velocity = 0
let gravity = 0.6

let pipes = []
let score = 0
let gameState = "START"

function jump(){

if(gameState === "START"){
gameState = "PLAY"
}

if(gameState === "PLAY"){
velocity = -10
}

if(gameState === "OVER"){
restart()
}

}

document.addEventListener("mousedown",jump)
document.addEventListener("touchstart",jump)

function restart(){

birdY = canvas.height/2
velocity = 0
pipes = []
score = 0
gameState = "PLAY"

}

function update(){

const w = canvas.width
const h = canvas.height

ctx.fillStyle = "#70c5ce"
ctx.fillRect(0,0,w,h)

if(gameState === "PLAY"){

velocity += gravity
birdY += velocity

if(pipes.length === 0 || pipes[pipes.length-1].x < w-250){

pipes.push({
x:w,
y:Math.random()*(h-300)+100,
scored:false
})

}

pipes.forEach((p,i)=>{

p.x -= 5

ctx.fillStyle = "#2ecc71"

ctx.fillRect(p.x,0,60,p.y)
ctx.fillRect(p.x,p.y+200,60,h)

if(100+30 > p.x && 100 < p.x+60 && (birdY < p.y || birdY+30 > p.y+200)){
gameState = "OVER"
}

if(!p.scored && p.x < 100){
score++
p.scored = true
}

if(p.x < -60){
pipes.splice(i,1)
}

})

if(birdY > h || birdY < 0){
gameState = "OVER"
}

}

ctx.fillStyle = "white"
ctx.fillRect(100,birdY,30,30)

ctx.fillStyle = "white"
ctx.font = "40px Arial"
ctx.textAlign = "center"

if(gameState === "START"){
ctx.fillText("PAUL BIRD",w/2,h/2)
ctx.fillText("Тап для старта",w/2,h/2+50)
}

if(gameState === "PLAY"){
ctx.fillText(score,w/2,80)
}

if(gameState === "OVER"){
ctx.fillText("GAME OVER",w/2,h/2)
ctx.fillText("Score: "+score,w/2,h/2+50)
}

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
