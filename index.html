        canvas { display: block; touch-action: none; }

<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const dpr = window.devicePixelRatio || 1;
function setupCanvas() {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
}

const soundWing = new Audio('wing.mp3');
const soundHit = new Audio('hit.mp3');
let isAudioInitialized = false;

let highScore = localStorage.getItem('clumsyBirdHighScore') || 0;

let birdY, birdX, birdSize, velocity, gravity, jump, score, birdRotation = 0;
let pipes = [];
let particles = [];
let pipeWidth, pipeGap;
let countdown = 3;
let gameState = 'START'; // START, COUNTDOWN, PLAY, OVER

function initGameValues() {
    const w = window.innerWidth, h = window.innerHeight;
    pipeWidth = Math.min(w * 0.15, 80);
    pipeGap = h * 0.28;
    birdSize = h * 0.07;
    birdX = w * 0.2;
    gravity = h * 0.0006;
    jump = h * -0.013;
    birdY = h / 2;
    velocity = 0;
    birdRotation = 0;
    pipes = [];
    particles = [];
    score = 0;
}

function createParticles(x, y) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            size: Math.random() * 5 + 2,
            life: 1.0
        });
    }
}

function handleInteraction(e) {
    if (e) e.preventDefault();
    if (!isAudioInitialized) {
        isAudioInitialized = true;
        soundWing.play().then(() => soundWing.pause());
    }
    if (gameState === 'START' || gameState === 'OVER') {
        initGameValues();
        gameState = 'COUNTDOWN';
        countdown = 3;
        let t = setInterval(() => {
            countdown--;
            if (countdown <= 0) { clearInterval(t); gameState = 'PLAY'; createPipe(); }
        }, 1000);
    } else if (gameState === 'PLAY') {
        velocity = jump;
        soundWing.currentTime = 0;
        soundWing.play().catch(() => {});
    }
}

function createPipe() {
    let h = window.innerHeight;
    let height = Math.floor(Math.random() * (h - pipeGap - 200)) + 100;
    pipes.push({ x: window.innerWidth, y: height, scored: false });
}

window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleInteraction(); });
canvas.addEventListener('touchstart', handleInteraction, {passive: false});
window.addEventListener('resize', () => { setupCanvas(); initGameValues(); });

function draw() {
    const w = window.innerWidth, h = window.innerHeight;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0, 0, w, h);

    if (gameState === 'PLAY') {
        velocity += gravity;
        birdY += velocity;
        birdRotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, velocity * 0.1));
