const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resize(){
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
}

// AUDIO SYSTEM
let audioCtx = null;
function unlockAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
}
document.addEventListener("touchstart",unlockAudio,{once:true});
document.addEventListener("mousedown",unlockAudio,{once:true});

function playSnd(f,type,dur,vol=0.08){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
    try {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = f;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    } catch(e){}
}

const highScore = 96;

let birdY, v, score, pipes, gameState="START", timerVal=3;
let pipeSpeed;
let bgType="day"; // day/night/lightning

function reset(){
    birdY = window.innerHeight/2;
    v = 0;
    score = 0;
    pipes = [];
    pipeSpeed = window.innerWidth * 0.006;
    bgType = "day";
    paulColor = "white";
}

function startCount(){
    gameState = "COUNT";
    timerVal = 3;
    playSnd(400,"sine",0.1);
    let interval = setInterval(()=>{
        timerVal--;
        if(timerVal > 0) playSnd(400,"sine",0.1);
        else if(timerVal === 0) playSnd(600,"sine",0.2);
        else { clearInterval(interval); gameState="PLAY"; }
    },1000);
}

function input(e){
    if(e) e.preventDefault();
    if(gameState==="START" || gameState==="OVER"){
        reset(); startCount();
    } else if(gameState==="PLAY"){
        v = window.innerHeight * -0.011;
        playSnd(450,"square",0.08);
    }
}

window.addEventListener("touchstart",input,{passive:false});
window.addEventListener("mousedown",input);
window.addEventListener("resize",resize);

function drawBackground(){
    if(bgType==="day"){
        ctx.fillStyle="#70c5ce"; // светлое небо
        ctx.fillRect(0,0,canvas.width,canvas.height);

    } else if(bgType==="night"){
        ctx.fillStyle="#001D3D"; // тёмное небо
        ctx.fillRect(0,0,canvas.width,canvas.height);
    } else if(bgType==="lightning"){
        ctx.fillStyle="#0A0A0A";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        // молния
        if(Math.random()<0.05){

            ctx.beginPath();
            ctx.moveTo(Math.random()*canvas.width,0);
            ctx.lineTo(Math.random()*canvas.width,canvas.height);
            ctx.stroke();
        }
    }
}
