<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Paul Bird</title>

<style>

body{
margin:0;
overflow:hidden;
background:#70c5ce;
font-family:Arial;
}

canvas{
display:block;
}

</style>

</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let birdY = canvas.height/2
let velocity = 0
let gravity = 0.6

let pipes = []
let score = 0
let best = localStorage.getItem("best") || 0

let state = "start"

const jumpSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg")

function jump(){

if(state === "start"){
state="play"
}

if(state === "play"){
velocity = -8
jumpSound.currentTime = 0
jumpSound.play()
}

if(state === "over"){
restart()
}

}

document.addEventListener("mousedown",jump)
document.addEventListener("touchstart",jump)

function restart(){

birdY = canvas.height/2
velocity = 0
pipes = []
score = 0
state = "play"

}

function game(){

ctx.fillStyle="#70c5ce"
ctx.fillRect(0,0,canvas.width,canvas.height)

if(state==="play"){

velocity += gravity
birdY += velocity

if(pipes.length === 0 || pipes[pipes.length-1].x < canvas.width-300){

pipes.push({
x:canvas.width,
y:Math.random()*(canvas.height-300)+100,
scored:false
})

}

pipes.forEach((p,i)=>{

p.x -= 2   // МЕДЛЕННЕЕ

ctx.fillStyle="#2ecc71"

ctx.fillRect(p.x,0,60,p.y)
ctx.fillRect(p.x,p.y+200,60,canvas.height)

if(120 > p.x && 120 < p.x+60){

if(birdY < p.y || birdY+30 > p.y+200){
state="over"
}

}

if(!p.scored && p.x < 120){
score++
p.scored=true

if(score>best){
best=score
localStorage.setItem("best",best)
}

}

if(p.x<-60){
pipes.splice(i,1)
}

})

if(birdY>canvas.height || birdY<0){
state="over"
}

}

ctx.fillStyle="white"
ctx.font="30px Arial"
ctx.fillText("PAUL",120,birdY+20)

ctx.font="40px Arial"
ctx.textAlign="center"

if(state==="start"){
ctx.fillText("PAUL BIRD",canvas.width/2,canvas.height/2)
ctx.fillText("Нажми чтобы начать",canvas.width/2,canvas.height/2+50)
}

if(state==="play"){
ctx.fillText(score,canvas.width/2,80)
ctx.font="20px Arial"
ctx.fillText("BEST: "+best,canvas.width/2,110)
}

if(state==="over"){
ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2)
ctx.fillText("Score: "+score,canvas.width/2,canvas.height/2+50)
ctx.fillText("BEST: "+best,canvas.width/2,canvas.height/2+90)
}

requestAnimationFrame(game)

}

game()

</script>

</body>
</html>
