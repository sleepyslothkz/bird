<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KZ BIRD ULTIMATE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #70c5ce; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const dpr = window.devicePixelRatio || 1;
function setup() {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
}

// Дыбыстар (GitHub-та wing.mp3 және hit.mp3 файлдары болуы керек)
const soundWing = new Audio('wing.mp3');
const soundHit = new Audio('hit.mp3');
let audioInit = false;

let highScore = localStorage.getItem('kzBirdHighScore') || 0;
let birdY, v, score, pipes, gameState = 'START', countdown = 3;

const flag = new Image();
flag.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA4MDAgNDAwIj48cmVjdCB3aWR0aD0iODAwIiBoZWlnaHQ9IjQwMCIgZmlsbD0iIzAwQUVDRSIvPjxwYXRoIGQ9Ik0zOTUuNSAxMTcuNWwtNS42IDE3LjEtMTguMS4xIDE0LjYgMTAuNi01LjYgMTcuMSA5LjctOS44IDUuNiAxNy4xIDE0LjYtMTAuNi01LjYtMTcuMSAxNC42LTEwLjZ6IiBmaWxsPSIjRkZEMDREIi8+PGNpcmNsZSBjeD0iNDAwIiBjeT0iMjAwIiByPSI2MCIgZmlsbD0iI0ZGRDA0RCIvPjxjaXJjbGUgY3g9IjQwMCIgY3k9IjIwMCIgcj0iNTAiIGZpbGw9IiMwMEFFQ0UiLz48ZyBmaWxsPSIjRkZEMDREIj48cGF0aCBkPSJNMzUwIDE4NWw4IDM5LTE5LTguMXptMTAwIDBscy04IDM5IDE5LTguMXoiLz48Y2lyY2xlIGN4PSIzNDAiIGN5PSIyMzAiIHI9IjgiLz48Y2lyY2xlIGN4PSI0NjAiIGN5PSIyMzAiIHI9IjgiLz48cGF0aCBkPSJNMzcwIDI4MHMyMCAzMCA2MCAwYy0xNSAyNS00NSAyNS02MCAweiIvPjwvZz48L3N2Zz4=';

function init() {
    birdY = window.innerHeight / 2;
    v = 0; score = 0; pipes = [];
}

function handleInput(e) {
    if(e) e.preventDefault();
    if(!audioInit) { audioInit = true; soundWing.play().then(()=>soundWing.pause()); }
    
    if(gameState === 'START' || gameState === 'OVER') {
        init();
        gameState = 'COUNT';
        countdown = 3;
        let t = setInterval(() => {
            countdown--;
            if(countdown <= 0) { clearInterval(t); gameState = 'PLAY'; }
        }, 1000);
    } else if(gameState === 'PLAY') {
        v = window.innerHeight * -0.012;
        soundWing.currentTime = 0; soundWing.play().catch(()=>{});
    }
}

window.addEventListener('touchstart', handleInput, {passive:false});
window.addEventListener('mousedown', handleInput);

function draw() {
    const w = window.innerWidth, h = window.innerHeight;
    ctx.fillStyle = "#70c5ce"; ctx.fillRect(0,0,w,h);

    if(gameState === 'PLAY') {
        v += h * 0.0006; birdY += v;
        if(pipes.length===0 || pipes[pipes.length-1].x < w*0.5) {
            pipes.push({x:w, y:Math.random()*(h-350)+100, scored:false});
        }
        pipes.forEach((p, i) => {
            p.x -= w*0.006;
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(p.x, 0, 60, p.y);
            ctx.fillRect(p.x, p.y+h*0.28, 60, h);
            if(w*0.2+40 > p.x && w*0.2 < p.x+60 && (birdY < p.y || birdY+25 > p.y+h*0.28)) {
                gameState = 'OVER'; soundHit.play().catch(()=>{});
            }
            if(!p.scored && p.x < w*0.2) { 
                score++; p.scored=true; 
                if(score > highScore) { highScore = score; localStorage.setItem('kzBirdHighScore', highScore); }
            }
            if(p.x < -60) pipes.splice(i,1);
        });
        if(birdY > h || birdY < 0) { gameState = 'OVER'; soundHit.play().catch(()=>{}); }
    }

    // Флаг
    ctx.save();
    ctx.translate(w*0.2 + 25, birdY + 12.5);
    ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, v*0.1)));
    ctx.drawImage(flag, -25, -12.5, 50, 25);
    ctx.restore();

    // Рекорд (Тұрақты түрде сол жақ жоғарыда)
    ctx.fillStyle = "white"; ctx.textAlign = "left";
    ctx.font = "bold 20px Arial"; ctx.fillText(`РЕКОРД: ${highScore}`, 20, 40);

    ctx.textAlign = "center";
    if(gameState==='COUNT') {
        const words = ["КЕТТІК!", "БІР", "ЕКІ", "ҮШ"];
        ctx.font = "bold 80px Arial"; ctx.fillText(words[countdown], w/2, h/2);
    } else if(gameState==='PLAY') {
        ctx.font = "bold 60px Arial"; ctx.fillText(score, w/2, 100);
    } else if(gameState==='OVER') {
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,w,h);
        ctx.fillStyle = "#f1c40f"; ctx.font = "bold 40px Arial"; ctx.fillText("ЖЕҢІЛДІҢ!", w/2, h/2);
        ctx.fillStyle = "white"; ctx.font = "24px Arial"; ctx.fillText(`Ұпайың: ${score}`, w/2, h/2+50);
        ctx.fillText("Қайталау үшін бас", w/2, h/2+90);
    } else if(gameState==='START') {
        ctx.font = "bold 30px Arial"; ctx.fillText("CLUMSY BIRD KZ", w/2, h/2);
        ctx.font = "20px Arial"; ctx.fillText("Бастау үшін бас", w/2, h/2+40);
    }
    requestAnimationFrame(draw);
}

setup(); init(); draw();
window.onresize = setup;
</script>
</body>
</html>
