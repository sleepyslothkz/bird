<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PAUL BIRD</title>
<style>
body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background-color:#70c5ce; font-family:Arial,sans-serif; }
canvas { display:block; touch-action:none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resize(){
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
}

// AUDIO SYSTEM
let audioCtx = null;
function unlockAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
}
document.addEventListener("touchstart",unlockAudio,{once:true});
document.addEventListener("mousedown",unlockAudio,{once:true});

function playSnd(f,type,dur,vol=0.08){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
    try {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = f;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    } catch(e){}
}

// Рекорд фиксированный
const highScore = 96;

let birdY, v, score, pipes, gameState="START", timerVal=3;
let pipeSpeed;

function reset(){
    birdY = window.innerHeight/2;
    v = 0;
    score = 0;
    pipes = [];
    pipeSpeed = window.innerWidth * 0.006; // нормальная скорость
}

function startCount(){
    gameState = "COUNT";
    timerVal = 3;
    playSnd(400,"sine",0.1);
    let interval = setInterval(()=>{
        timerVal--;
        if(timerVal > 0) playSnd(400,"sine",0.1);
        else if(timerVal === 0) playSnd(600,"sine",0.2);
        else { clearInterval(interval); gameState="PLAY"; }
    },1000);
}

function input(e){
    if(e) e.preventDefault();
    if(gameState==="START" || gameState==="OVER"){
        reset(); startCount();
    } else if(gameState==="PLAY"){
        v = window.innerHeight * -0.011;
        playSnd(450,"square",0.08);
    }
}

window.addEventListener("touchstart",input,{passive:false});
window.addEventListener("mousedown",input);
window.addEventListener("resize",resize);

const flag = new Image();
flag.src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA4MDAgNDAwIj48cmVjdCB3aWR0aD0iODAwIiBoZWlnaHQ9IjQwMCIgZmlsbD0iIzAwQUVDRSIvPjxjaXJjbGUgY3g9IjQwMCIgY3k9IjIwMCIgcj0iNjAiIGZpbGw9IiNGRkQwNEQiLz48L3N2Zz4=";

function draw(){
    const w = window.innerWidth;
    const h = window.innerHeight;
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0,0,w,h);

    if(gameState === "PLAY"){
        v += h*0.0006;
        birdY += v;

        if(pipes.length===0 || pipes[pipes.length-1].x<w-250){
            pipes.push({ x:w, y:Math.random()*(h-300)+100, scored:false });
        }

        pipes.forEach((p,i)=>{
            p.x -= pipeSpeed;
            ctx.fillStyle="#2ecc71";
            ctx.fillRect(p.x,0,60,p.y);
            ctx.fillRect(p.x,p.y+220,60,h);

            // Столкновение
            if(w*0.2+40 > p.x && w*0.2 < p.x+60 && (birdY<p.y || birdY+25>p.y+220)){
                gameState="OVER";
                playSnd(150,"sawtooth",0.4);
            }

            // Счёт
            if(!p.scored && p.x<w*0.2){
                score++;
                p.scored=true;
                // Каждые 20 очков необычный звук
                if(score % 20 === 0){
                    playSnd(880,"sine",0.25,0.15);
                    setTimeout(()=>playSnd(1100,"sine",0.25,0.15),100);
                } else {
                    playSnd(900,"triangle",0.12);
                }
            }

            if(p.x<-60) pipes.splice(i,1);
        });

        if(birdY>h || birdY<0){
            gameState="OVER";
            playSnd(150,"sawtooth",0.4);
        }
    }

    // Текст Paul
    ctx.save();
    ctx.translate(w*0.2+25, birdY+12);
    if(gameState==="PLAY") ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, v*0.1)));
    ctx.fillStyle="white";
    ctx.font="bold 20px Arial";
    ctx.fillText("PAUL", -20,5);
    ctx.restore();

    // Рекорд
    ctx.fillStyle="white";
    ctx.textAlign="left";
    ctx.font="bold 20px Arial";
    ctx.fillText("РЕКОРД: "+highScore,20,40);

    // Обратный отчёт после проигрыша
    if(gameState==="OVER"){
        ctx.fillStyle="rgba(0,0,0,0.4)";
        ctx.fillRect(0,0,w,h);
        ctx.fillStyle="white";
        ctx.font="bold 40px Arial";
        ctx.textAlign="center";
        ctx.fillText("ЖЕҢІЛДІҢ!", w/2, h/2);
        ctx.font="24px Arial";
        ctx.fillText("Ұпай: "+score, w/2, h/2+50);

        // Обратный отсчёт
        ctx.fillText("Қайталау үшін бас: 3", w/2, h/2+90);
        setTimeout(()=>{ctx.fillText("Қайталау үшін бас: 2", w/2, h/2+90);},500);
        setTimeout(()=>{ctx.fillText("Қайталау үшін бас: 1", w/2, h/2+90);},1000);
    }

    requestAnimationFrame(draw);
}

resize();
reset();
draw();
</script>
</body>
</html>
